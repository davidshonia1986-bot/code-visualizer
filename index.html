<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Layer Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06060c;
    --accent: #7c6ff7;
    --accent-dim: rgba(124,111,247,0.3);
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.07);
    --text: rgba(255,255,255,0.88);
    --text-dim: rgba(255,255,255,0.35);
    --speed: 500ms;
    --ease: cubic-bezier(0.23,1,0.32,1);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
  }

  /* ── Full-screen canvas ── */
  #vizCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ── Layer stack indicator ── */
  .layer-stack {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }

  .layer-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: all 200ms;
  }

  .layer-pill:hover {
    background: rgba(124,111,247,0.1);
    border-color: var(--accent-dim);
    color: var(--text);
  }

  .layer-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .layer-pill.active .dot {
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }

  /* ── Compact input bar ── */
  .input-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: stretch;
    background: rgba(10,10,22,0.95);
    border-top: 1px solid rgba(124,111,247,0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 -4px 30px rgba(124,111,247,0.1), 0 -1px 0 rgba(255,255,255,0.06);
    transition: transform var(--speed) var(--ease);
  }

  .input-bar.hidden {
    transform: translateY(100%);
  }

  .input-bar input {
    flex: 1;
    height: 64px;
    padding: 0 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    margin: 8px 0 8px 8px;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text);
    caret-color: var(--accent);
    transition: border-color 200ms, box-shadow 200ms;
  }

  .input-bar input:focus {
    border-color: rgba(124,111,247,0.4);
    box-shadow: 0 0 20px rgba(124,111,247,0.08);
  }

  .input-bar input::placeholder { color: var(--text-dim); }

  .input-bar .hint {
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    border-left: 1px solid rgba(255,255,255,0.04);
  }

  .input-bar .hint kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    margin: 0 2px;
  }

  .input-bar .btn-run {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 20px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 200ms;
  }

  .input-bar .btn-run:hover { background: #6b5ce6; }

  .input-bar .btn-run svg {
    width: 12px; height: 12px;
    fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round;
  }

  /* ── Sidebar toggle ── */
  .sidebar-toggle {
    position: fixed;
    top: 12px; left: 12px;
    z-index: 300;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms;
  }

  .sidebar-toggle:hover {
    background: rgba(124,111,247,0.15);
    border-color: var(--accent-dim);
  }

  .sidebar-toggle svg {
    width: 16px; height: 16px;
    fill: none; stroke: var(--text);
    stroke-width: 2; stroke-linecap: round;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 360px;     height: calc(100% - 64px);
    background: rgba(8,8,18,0.92);
    border-right: 1px solid var(--glass-border);
    backdrop-filter: blur(24px);
    z-index: 250;
    transform: translateX(-100%);
    transition: transform var(--speed) var(--ease);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-head {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .sidebar-head h2 {
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 2px;
  }

  .sidebar-head p {
    font-size: 10px; color: var(--text-dim);
  }

  .filter-bar {
    display: flex; gap: 3px;
    padding: 8px 16px;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .filter-bar::-webkit-scrollbar { height: 0; }

  .filter-btn {
    padding: 3px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: all 200ms;
  }

  .filter-btn:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }

  .filter-btn.active {
    background: rgba(124,111,247,0.12);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .examples-list {
    flex: 1; overflow-y: auto;
    padding: 6px 10px;
  }

  .examples-list::-webkit-scrollbar { width: 3px; }
  .examples-list::-webkit-scrollbar-track { background: transparent; }
  .examples-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .ex-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 200ms;
  }

  .ex-card:hover {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.05);
  }

  .ex-card:active { transform: scale(0.98); }

  .ex-card .icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .ex-card .info { flex: 1; min-width: 0; }

  .ex-card .name {
    font-size: 12px; font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .ex-card .desc {
    font-size: 10px; color: var(--text-dim); font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .cat-space .icon { background: rgba(99,140,255,0.15); }
  .cat-fractal .icon { background: rgba(168,85,247,0.15); }
  .cat-war .icon { background: rgba(239,68,68,0.15); }
  .cat-scifi .icon { background: rgba(34,211,238,0.15); }
  .cat-movie .icon { background: rgba(251,191,36,0.15); }
  .cat-game .icon { background: rgba(52,211,153,0.15); }
  .cat-myth .icon { background: rgba(244,114,182,0.15); }
  .cat-horror .icon { background: rgba(156,163,175,0.15); }

  /* ── Connection status ── */
  .conn-status {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 300;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    backdrop-filter: blur(12px);
    font-size: 10px;
    color: var(--text-dim);
    transition: all 300ms;
  }

  .conn-status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ef4444;
    transition: background 300ms;
  }

  .conn-status.connected .dot {
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }

  .conn-status .users {
    margin-left: 4px;
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>

<canvas id="vizCanvas"></canvas>

<div class="conn-status" id="connStatus">
  <span class="dot"></span>
  <span id="connText">Connecting...</span>
  <span class="users" id="userCount"></span>
</div>

<div class="layer-stack" id="layerStack"></div>

<button class="sidebar-toggle" id="sidebarToggle">
  <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <h2>Visualizations</h2>
    <p>Click to run as a fullscreen layer</p>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="examples-list" id="examplesList"></div>
</div>

<div class="input-bar" id="inputBar">
  <input type="text" id="codeInput" placeholder="Type viz name or JS code: ctx.fillStyle='red'; ctx.fillRect(0,0,w,h)" spellcheck="false" autocomplete="off" />
  <span class="hint"><kbd>Enter</kbd> run</span>
  <button class="btn-run" id="btnRun">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Run
  </button>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CANVAS ENGINE
   ═══════════════════════════════════════════════════ */

const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Layer system ── */
const vizLayers = [];  // { name, viz, startTime, opacity, active, offscreen }
let activeLayerIdx = -1;
const MAX_LAYERS = 10;

function createOffscreen() {
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  return c;
}

function addVizLayer(vizFn, name, opts = {}) {
  if (vizLayers.length >= MAX_LAYERS) {
    vizLayers.shift();
  }
  const off = createOffscreen();
  const layer = {
    name,
    viz: vizFn,
    startTime: performance.now(),
    opacity: 0,
    active: true,
    offscreen: off,
    remote: opts.remote || false,
    addedBy: opts.addedBy || '',
  };
  vizLayers.push(layer);
  activeLayerIdx = vizLayers.length - 1;
  renderLayerStack();

  // Broadcast to other users (only local actions)
  if (!opts.remote && ws && ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'add-layer',
      vizName: name,
      vizCode: opts.vizCode || null,
      addedBy: userId,
    }));
  }
}

function removeLayer(idx) {
  vizLayers.splice(idx, 1);
  if (activeLayerIdx >= vizLayers.length) activeLayerIdx = vizLayers.length - 1;
  renderLayerStack();
}

function renderLayerStack() {
  const stack = document.getElementById('layerStack');
  stack.innerHTML = vizLayers.map((l, i) => {
    const who = l.addedBy ? ` [${l.addedBy.slice(0,6)}]` : '';
    return `<div class="layer-pill ${i === activeLayerIdx ? 'active' : ''}" data-idx="${i}">
      <span class="dot"></span>${l.name}${who}
    </div>`;
  }).join('');

  stack.querySelectorAll('.layer-pill').forEach(el => {
    el.addEventListener('click', () => {
      activeLayerIdx = parseInt(el.dataset.idx);
      renderLayerStack();
    });
    el.addEventListener('dblclick', () => {
      removeLayer(parseInt(el.dataset.idx));
    });
  });
}

/* ── Animation loop ── */
function animate(now) {
  // Resize offscreen canvases if window changed
  for (const layer of vizLayers) {
    if (layer.offscreen.width !== W || layer.offscreen.height !== H) {
      layer.offscreen.width = W;
      layer.offscreen.height = H;
    }
  }

  // Background
  ctx.fillStyle = '#06060c';
  ctx.fillRect(0, 0, W, H);

  for (const layer of vizLayers) {
    // Fade in
    if (layer.opacity < 1) layer.opacity = Math.min(1, layer.opacity + 0.02);
    const t = (now - layer.startTime) / 1000;

    // Render layer into its own offscreen canvas
    const octx = layer.offscreen.getContext('2d');
    octx.clearRect(0, 0, W, H);
    try {
      layer.viz(octx, W, H, t, now);
    } catch(e) { /* skip frame on error */ }

    // Composite onto main canvas with layer opacity
    ctx.save();
    ctx.globalAlpha = layer.opacity;
    ctx.drawImage(layer.offscreen, 0, 0);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ═══════════════════════════════════════════════════
   20 VISUALIZATIONS
   ═══════════════════════════════════════════════════ */

const VIZ = [
  // 1 ── STARFIELD / WARP SPEED ──
  {
    cat: 'space', icon: '\u2728', name: 'Warp Speed',
    desc: 'Fly through stars at light speed',
    viz: (ctx, w, h, t) => {
      const stars = [];
      const N = 600;
      for (let i = 0; i < N; i++) {
        if (!stars._init) {
          stars._init = true;
          stars._data = [];
          for (let j = 0; j < N; j++) {
            stars._data.push({
              x: (Math.random() - 0.5) * 2,
              y: (Math.random() - 0.5) * 2,
              z: Math.random() * 2000,
              pz: 0,
            });
          }
        }
      }
      const data = stars._data;
      const cx = w / 2, cy = h / 2;
      const speed = 8 + Math.sin(t * 0.5) * 4;

      ctx.fillStyle = '#06060c';
      ctx.fillRect(0, 0, w, h);

      for (const s of data) {
        s.z -= speed;
        if (s.z <= 1) {
          s.x = (Math.random() - 0.5) * 2;
          s.y = (Math.random() - 0.5) * 2;
          s.z = 2000;
          s.pz = s.z;
        }
        s.pz = s.z;

        const sx = cx + (s.x / s.z) * 300 * w / 2;
        const sy = cy + (s.y / s.z) * 300 * h / 2;
        const px = cx + (s.x / s.pz) * 300 * w / 2;
        const py = cy + (s.y / s.pz) * 300 * h / 2;

        const size = Math.max(0.5, (1 - s.z / 2000) * 3);
        const alpha = Math.min(1, (1 - s.z / 2000) * 1.5);

        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,210,255,${alpha})`;
        ctx.lineWidth = size;
        ctx.moveTo(px, py);
        ctx.lineTo(sx, sy);
        ctx.stroke();
      }
    }
  },

  // 2 ── NEBULA CLOUDS ──
  {
    cat: 'space', icon: '\ud83c\udf0c', name: 'Nebula Drift',
    desc: 'Cosmic gas clouds drifting through space',
    viz: (ctx, w, h, t) => {
      const clouds = [
        { x: 0.3, y: 0.4, r: 0.35, color: [99,100,247] },
        { x: 0.7, y: 0.6, r: 0.3, color: [200,50,120] },
        { x: 0.5, y: 0.3, r: 0.25, color: [30,180,220] },
        { x: 0.2, y: 0.7, r: 0.32, color: [120,50,200] },
        { x: 0.8, y: 0.3, r: 0.28, color: [240,120,50] },
      ];

      for (const c of clouds) {
        const cx = (c.x + Math.sin(t * 0.2 + c.x * 10) * 0.05) * w;
        const cy = (c.y + Math.cos(t * 0.15 + c.y * 8) * 0.05) * h;
        const r = c.r * Math.max(w, h) * (1 + Math.sin(t * 0.3 + c.x) * 0.1);
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, `rgba(${c.color.join(',')},0.12)`);
        grad.addColorStop(0.5, `rgba(${c.color.join(',')},0.04)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }
    }
  },

  // 3 ── MATRIX RAIN ──
  {
    cat: 'scifi', icon: '\ud83d\udcc4', name: 'Matrix Rain',
    desc: 'The Matrix has you...',
    viz: (ctx, w, h, t) => {
      const chars = '0123456789ABCDEFアイウエオカキクケコサシスセソ';
      const fontSize = 14;
      const cols = Math.ceil(w / fontSize);

      if (!ctx._matrix) {
        ctx._matrix = [];
        for (let i = 0; i < cols; i++) {
          ctx._matrix.push({
            y: Math.random() * h,
            speed: 1 + Math.random() * 3,
            chars: []
          });
        }
      }

      ctx.fillStyle = 'rgba(6,6,12,0.06)';
      ctx.fillRect(0, 0, w, h);
      ctx.font = `${fontSize}px JetBrains Mono, monospace`;

      for (let i = 0; i < cols; i++) {
        const col = ctx._matrix[i];
        col.y += col.speed;
        if (col.y > h) col.y = -fontSize;

        const x = i * fontSize;
        const ch = chars[Math.floor(Math.random() * chars.length)];

        // Bright head
        ctx.fillStyle = `rgba(180,255,180,0.9)`;
        ctx.fillText(ch, x, col.y);

        // Trail
        for (let j = 1; j < 20; j++) {
          const alpha = 0.5 / (j * 0.5);
          ctx.fillStyle = `rgba(0,200,0,${alpha})`;
          ctx.fillText(
            chars[Math.floor(Math.random() * chars.length)],
            x, col.y - j * fontSize
          );
        }
      }
    }
  },

  // 4 ── MANDELBROT ZOOM ──
  {
    cat: 'fractal', icon: '\ud83d\udd2e', name: 'Mandelbrot',
    desc: 'Infinite fractal zoom',
    viz: (ctx, w, h, t) => {
      const zoom = 0.5 + t * 0.02;
      const cx = -0.745 + Math.sin(t * 0.1) * 0.1;
      const cy = 0.186 + Math.cos(t * 0.08) * 0.1;
      const maxIter = 80;
      const imgData = ctx.createImageData(w, h);
      const data = imgData.data;

      for (let px = 0; px < w; px += 3) {
        for (let py = 0; py < h; py += 3) {
          const x0 = (px - w / 2) / (zoom * w * 0.4) + cx;
          const y0 = (py - h / 2) / (zoom * h * 0.4) + cy;
          let x = 0, y = 0, iter = 0;

          while (x * x + y * y <= 4 && iter < maxIter) {
            const xn = x * x - y * y + x0;
            y = 2 * x * y + y0;
            x = xn;
            iter++;
          }

          const hue = (iter / maxIter) * 360 + t * 20;
          const sat = iter < maxIter ? 80 : 0;
          const lum = iter < maxIter ? (iter / maxIter) * 50 : 0;
          const [r, g, b] = hsl2rgb(hue % 360, sat, lum);

          // Fill 3x3 block
          for (let dx = 0; dx < 3 && px + dx < w; dx++) {
            for (let dy = 0; dy < 3 && py + dy < h; dy++) {
              const idx = ((py + dy) * w + (px + dx)) * 4;
              data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
            }
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }
  },

  // 5 ── FRACTAL TREE ──
  {
    cat: 'fractal', icon: '\ud83c\udf33', name: 'Fractal Tree',
    desc: 'Recursive branching tree',
    viz: (ctx, w, h, t) => {
      ctx.fillStyle = 'rgba(6,6,12,0.08)';
      ctx.fillRect(0, 0, w, h);

      const maxDepth = 10;
      const branchAngle = 0.4 + Math.sin(t * 0.3) * 0.15;

      function branch(x, y, angle, depth, len) {
        if (depth <= 0 || len < 2) return;
        const x2 = x + Math.cos(angle) * len;
        const y2 = y + Math.sin(angle) * len;

        const hue = 260 + depth * 10 + Math.sin(t + depth) * 20;
        const alpha = 0.3 + (depth / maxDepth) * 0.5;
        ctx.strokeStyle = `hsla(${hue},60%,${40 + depth * 5}%,${alpha})`;
        ctx.lineWidth = depth * 0.8;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        const sway = Math.sin(t * 0.5 + depth * 0.3) * 0.1;
        branch(x2, y2, angle - branchAngle + sway, depth - 1, len * 0.7);
        branch(x2, y2, angle + branchAngle + sway, depth - 1, len * 0.7);
      }

      branch(w / 2, h, -Math.PI / 2, maxDepth, h * 0.22);
    }
  },

  // 6 ── WARHAMMER 40K HUD ──
  {
    cat: 'war', icon: '\u2694\ufe0f', name: 'Adeptus Mechanicus',

  {

    desc: 'Five-dimensional space-time corridor',
    viz: (ctx, w, h, t) => {
      const cx = w / 2, cy = h / 2;
      const layers = 12;

      for (let i = 0; i < layers; i++) {
        const phase = t * 0.5 + i * 0.5;
        const scale = 0.1 + (i / layers) * 0.9;
        const alpha = 0.1 + (i / layers) * 0.15;
        const size = Math.min(w, h) * 0.4 * scale;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(phase * 0.2 + i * 0.1);
        ctx.strokeStyle = `rgba(255,200,50,${alpha})`;
        ctx.lineWidth = 1;

        // Cube wireframe
        const s = size;
        const corners = [
          [-s,-s,-s], [s,-s,-s], [s,s,-s], [-s,s,-s],
          [-s,-s,s],  [s,-s,s],  [s,s,s],  [-s,s,s]
        ];
        const edges = [
          [0,1],[1,2],[2,3],[3,0],
          [4,5],[5,6],[6,7],[7,4],
          [0,4],[1,5],[2,6],[3,7]
        ];

        // Project 3D to 2D
        const proj = corners.map(([x, y, z]) => {
          const angle = phase;
          const cosA = Math.cos(angle), sinA = Math.sin(angle);
          const rx = x * cosA - z * sinA;
          const rz = x * sinA + z * cosA;
          const perspective = 600 / (600 + rz);
          return [cx + rx * perspective, cy + y * perspective];
        });

        for (const [a, b] of edges) {
          ctx.beginPath();
          ctx.moveTo(proj[a][0], proj[a][1]);
          ctx.lineTo(proj[b][0], proj[b][1]);
          ctx.stroke();
        }
        ctx.restore();
      }

      ctx.fillStyle = 'rgba(255,200,50,0.5)';
      ctx.font = '11px JetBrains Mono';
      ctx.fillText('DO NOT GO GENTLE', 20, 30);

      ctx.lineWidth = 0.5;
      for (let i = 0; i < ctx._stars.length; i++) {
        for (let j = i + 1; j < ctx._stars.length; j++) {
          const a = ctx._stars[i], b = ctx._stars[j];
          const d = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
          if (d < 150) {
            const alpha = (1 - d / 150) * 0.1;
            ctx.strokeStyle = `rgba(124,111,247,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }
  },

  // 19 ── GLITCH ART ──
  {
    cat: 'horror', icon: '\ud83d\udd34', name: 'Glitch Art',
    desc: 'Digital corruption and signal decay',
    viz: (ctx, w, h, t) => {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, w, h);

      // Glitch bars
      for (let i = 0; i < 30; i++) {
        const y = Math.random() * h;
        const barH = 2 + Math.random() * 20;
        const shift = (Math.random() - 0.5) * 60;
        const hue = Math.random() * 360;
        const alpha = 0.05 + Math.random() * 0.15;

        ctx.fillStyle = `hsla(${hue},80%,50%,${alpha})`;
        ctx.fillRect(shift, y, w, barH);
      }

      // Scan lines
      ctx.fillStyle = 'rgba(0,0,0,0.03)';
      for (let y = 0; y < h; y += 2) {
        ctx.fillRect(0, y, w, 1);
      }

      // Static noise
      for (let i = 0; i < 500; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const size = 1 + Math.random() * 3;
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.1})`;
        ctx.fillRect(x, y, size, size);
      }

      // Glitch text
      if (Math.sin(t * 5) > 0.8) {
        ctx.fillStyle = `rgba(255,0,0,0.6)`;
        ctx.font = 'bold 48px JetBrains Mono';
        ctx.fillText('SIGNAL LOST', w / 2 - 180, h / 2);
      }
    }
  },

  // 20 ── KALEIDOSCOPE ──
  {
    cat: 'fractal', icon: '\ud83c\udfa8', name: 'Kaleidoscope',
    desc: 'Symmetric geometric patterns',
    viz: (ctx, w, h, t) => {
      const cx = w / 2, cy = h / 2;
      const segments = 12;
      const angleStep = (Math.PI * 2) / segments;

      ctx.save();
      ctx.translate(cx, cy);

      for (let s = 0; s < segments; s++) {
        ctx.save();
        ctx.rotate(s * angleStep + t * 0.2);

        // Mirror every other segment
        if (s % 2 === 1) ctx.scale(1, -1);

        for (let i = 0; i < 6; i++) {
          const r = 50 + i * 40 + Math.sin(t + i) * 20;
          const hue = (s * 30 + i * 40 + t * 30) % 360;
          const alpha = 0.15 - i * 0.02;

          ctx.strokeStyle = `hsla(${hue},70%,50%,${alpha})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, angleStep);
          ctx.stroke();
        }

        // Geometric shapes
        const r = 100 + Math.sin(t * 0.5) * 30;
        const hue = (s * 30 + t * 20) % 360;
        ctx.strokeStyle = `hsla(${hue},80%,60%,0.2)`;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(r * 0.7, -r * 0.3);
        ctx.lineTo(r, 0);
        ctx.stroke();

        ctx.restore();
      }

      ctx.restore();
    }
  },

  // 21 ── JEDI LIGHTSABER ──
  {
    cat: 'myth', icon: '\u2694\ufe0f', name: 'Jedi Lightsaber',
    desc: 'Джедайский меч пишет привет',
    viz: (ctx, w, h, t) => {
      const text = 'привет пацанчики';
      const fontSize = Math.min(w / text.length, 72);
      ctx.font = `bold ${fontSize}px Inter, sans-serif`;

      // Measure full text width to center it
      const totalW = ctx.measureText(text).width;
      const startX = (w - totalW) / 2;
      const baseY = h / 2;

      // ── Blurred stars background ──
      if (!ctx._jediStars) {
        ctx._jediStars = [];
        for (let i = 0; i < 200; i++) {
          ctx._jediStars.push({
            x: Math.random() * 2000,
            y: Math.random() * 2000,
            r: 0.5 + Math.random() * 2.5,
            brightness: 0.2 + Math.random() * 0.6,
            twinkleSpeed: 1 + Math.random() * 3,
            blur: 1 + Math.random() * 4,
          });
        }
      }

      // Draw blurred stars
      for (const s of ctx._jediStars) {
        const sx = s.x % w, sy = s.y % h;
        const flicker = 0.5 + Math.sin(t * s.twinkleSpeed + s.x) * 0.5;
        const alpha = s.brightness * flicker;

        // Outer glow (blur)
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.r * s.blur);
        grad.addColorStop(0, `rgba(200,210,255,${alpha * 0.6})`);
        grad.addColorStop(0.3, `rgba(180,190,255,${alpha * 0.2})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r * s.blur, 0, Math.PI * 2);
        ctx.fill();

        // Core bright dot
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // ── Get character positions ──
      const chars = [];
      let cursorX = startX;
      for (const ch of text) {
        const charW = ctx.measureText(ch).width;
        chars.push({ ch, x: cursorX, w: charW, cx: cursorX + charW / 2 });
        cursorX += charW;
      }

      // ── Lightsaber writing progress ──
      const writeSpeed = 0.4; // chars per second
      const charsVisible = Math.floor(t * writeSpeed);
      const partialProgress = (t * writeSpeed) % 1;

      // ── Lightsaber hilt position ──
      let hiltX, hiltY, bladeAngle;
      if (charsVisible < chars.length) {
        const cur = chars[Math.min(charsVisible, chars.length - 1)];
        const nextX = charsVisible < chars.length - 1
          ? chars[charsVisible + 1].cx : cur.cx;
        const progressX = cur.cx + (nextX - cur.cx) * partialProgress;

        hiltX = progressX;
        hiltY = baseY + fontSize * 0.55;
        bladeAngle = -Math.PI / 2; // pointing up
      } else {
        // All chars done — saber rests at center
        hiltX = w / 2;
        hiltY = baseY + fontSize * 0.55;
        bladeAngle = -Math.PI / 2 + Math.sin(t * 0.8) * 0.15;
      }

      // ── Draw revealed characters with glow ──
      for (let i = 0; i <= Math.min(charsVisible, chars.length - 1); i++) {
        const c = chars[i];
        const charAlpha = i < charsVisible
          ? 1
          : partialProgress;

        // Green glow behind text
        ctx.save();
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = 30;
        ctx.fillStyle = `rgba(0,255,65,${charAlpha * 0.9})`;
        ctx.fillText(c.ch, c.x, baseY);
        ctx.restore();

        // Bright core
        ctx.fillStyle = `rgba(200,255,220,${charAlpha * 0.7})`;
        ctx.fillText(c.ch, c.x, baseY);
      }

      // ── Draw lightsaber ──
      const bladeLen = fontSize * 0.9;

      // Blade tip (with slight wobble)
      const wobble = Math.sin(t * 8) * 2;
      const tipX = hiltX + Math.cos(bladeAngle) * bladeLen + wobble * Math.cos(bladeAngle + Math.PI/2);
      const tipY = hiltY + Math.sin(bladeAngle) * bladeLen + wobble * Math.sin(bladeAngle + Math.PI/2);

      // Outer glow of blade
      ctx.save();
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 50;
      ctx.strokeStyle = 'rgba(0,255,65,0.3)';
      ctx.lineWidth = 18;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hiltX, hiltY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      ctx.restore();

      // Mid glow
      ctx.strokeStyle = 'rgba(0,255,65,0.6)';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hiltX, hiltY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // Core blade
      ctx.strokeStyle = 'rgba(180,255,200,0.95)';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hiltX, hiltY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // White hot center
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hiltX, hiltY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // ── Hilt ──
      const hiltW = 10, hiltH = 30;
      const hx = hiltX - hiltW / 2;
      const hy = hiltY;

      // Hilt body
      ctx.fillStyle = '#555';
      ctx.fillRect(hx, hy, hiltW, hiltH);

      // Hilt details
      ctx.fillStyle = '#333';
      ctx.fillRect(hx + 1, hy + 4, hiltW - 2, 3);
      ctx.fillRect(hx + 1, hy + 12, hiltW - 2, 3);
      ctx.fillStyle = '#888';
      ctx.fillRect(hx + 2, hy + 8, hiltW - 4, 2);
      ctx.fillStyle = '#c33';
      ctx.beginPath();
      ctx.arc(hiltX, hy + 20, 3, 0, Math.PI * 2);
      ctx.fill();

      // ── Sparks at tip ──
      if (charsVisible < chars.length) {
        for (let i = 0; i < 5; i++) {
          const sparkX = tipX + (Math.random() - 0.5) * 20;
          const sparkY = tipY + (Math.random() - 0.5) * 20;
          const sparkAlpha = 0.3 + Math.random() * 0.5;
          ctx.fillStyle = `rgba(0,255,65,${sparkAlpha})`;
          ctx.beginPath();
          ctx.arc(sparkX, sparkY, 1 + Math.random() * 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // ── Subtle label ──
      ctx.fillStyle = 'rgba(0,255,65,0.3)';
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.fillText('May the Force be with you', 20, 30);
    }
  },
];

/* ═══════════════════════════════════════════════════
   SIDEBAR + FILTERS
   ═══════════════════════════════════════════════════ */

const categories = [...new Set(VIZ.map(v => v.cat))];
const catLabels = {
  space:'Space', fractal:'Fractals', war:'Warhammer 40K',
  scifi:'Sci-Fi', movie:'Movies', game:'Games',
  myth:'Myth & Fantasy', horror:'Horror'
};

let activeFilter = 'all';

function renderFilters() {
  let html = `<button class="filter-btn active" data-cat="all">All</button>`;
  categories.forEach(c => {
    html += `<button class="filter-btn" data-cat="${c}">${catLabels[c]}</button>`;
  });
  document.getElementById('filterBar').innerHTML = html;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderExamples();
    });
  });
}

function renderExamples() {
  const filtered = activeFilter === 'all' ? VIZ : VIZ.filter(v => v.cat === activeFilter);
  document.getElementById('examplesList').innerHTML = filtered.map((v, i) => {
    const gi = VIZ.indexOf(v);
    return `
      <div class="ex-card cat-${v.cat}" data-idx="${gi}">
        <div class="icon">${v.icon}</div>
        <div class="info">
          <div class="name">${v.name}</div>
          <div class="desc">${v.desc}</div>
        </div>
      </div>`;
  }).join('');

  document.querySelectorAll('.ex-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx);
      const v = VIZ[idx];
      addVizLayer(v.viz, v.name, { vizCode: v.viz.toString() });
    });
  });
}

/* ═══════════════════════════════════════════════════
   INPUT HANDLING
   ═══════════════════════════════════════════════════ */

const inputEl = document.getElementById('codeInput');
const btnRun = document.getElementById('btnRun');
const sidebarEl = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebarToggle');

toggleBtn.addEventListener('click', () => sidebarEl.classList.toggle('open'));

function runInput() {
  const val = inputEl.value.trim();
  if (!val) return;

  // Check if it matches a viz name
  const match = VIZ.find(v => v.name.toLowerCase() === val.toLowerCase());
  if (match) {
    addVizLayer(match.viz, match.name, { vizCode: match.viz.toString() });
    inputEl.value = '';
    return;
  }

  // Try to run as custom JS canvas code
  try {
    const userViz = new Function('ctx', 'w', 'h', 't', 'now', val);
    addVizLayer(userViz, 'Custom: ' + val.slice(0, 30), { vizCode: val });
    inputEl.value = '';
  } catch (e) {
    inputEl.style.boxShadow = '0 0 0 1px rgba(239,68,68,0.5)';
    setTimeout(() => inputEl.style.boxShadow = '', 1000);
  }
}

btnRun.addEventListener('click', runInput);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') runInput();
});

// Init
renderFilters();
renderExamples();

/* ═══════════════════════════════════════════════════
   MULTI-USER SYNC
   ═══════════════════════════════════════════════════ */

const userId = 'u' + Math.random().toString(36).slice(2, 8);
let ws = null;
let reconnectTimer = null;
const connStatus = document.getElementById('connStatus');
const connText = document.getElementById('connText');

// Viz name → function lookup for receiving remote layers
const vizByName = {};
VIZ.forEach(v => { vizByName[v.name.toLowerCase()] = v.viz; });

function receiveLayer(layerData) {
  if (vizLayers.some(l => l._serverId === layerData.id)) return;
  if (layerData.addedBy === userId) return;

  let vizFn = null;
  if (layerData.vizName && vizByName[layerData.vizName.toLowerCase()]) {
    vizFn = vizByName[layerData.vizName.toLowerCase()];
  }
  if (!vizFn && layerData.vizCode) {
    try { vizFn = new Function('ctx', 'w', 'h', 't', 'now', layerData.vizCode); }
    catch (e) { return; }
  }
  if (!vizFn) return;

  if (vizLayers.length >= MAX_LAYERS) vizLayers.shift();
  const off = createOffscreen();
  vizLayers.push({
    name: layerData.vizName || 'Remote',
    viz: vizFn,
    startTime: performance.now(),
    opacity: 0, active: true,
    offscreen: off, remote: true,
    addedBy: layerData.addedBy || '?',
    _serverId: layerData.id,
  });
  activeLayerIdx = vizLayers.length - 1;
  renderLayerStack();
}

/* ── BroadcastChannel: syncs across tabs on same device (instant, no server) ── */
const bc = new BroadcastChannel('viz-layers');
bc.onmessage = (e) => {
  const msg = e.data;
  if (msg.type === 'new-layer') receiveLayer(msg.layer);
  if (msg.type === 'clear-all') {
    vizLayers.length = 0;
    activeLayerIdx = -1;
    renderLayerStack();
  }
};

function broadcastLayer(layerData) {
  bc.postMessage({ type: 'new-layer', layer: layerData });
}

/* ── WebSocket: syncs across devices when server is running ── */
function getServerUrl() {
  const saved = localStorage.getItem('viz_server_url');
  if (saved) return saved;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.hostname}:3000`;
}

function connectWS() {
  const serverUrl = getServerUrl();
  try {
    ws = new WebSocket(serverUrl);
  } catch (e) {
    connText.textContent = 'Local mode';
    return;
  }

  ws.onopen = () => {
    connStatus.classList.add('connected');
    connText.textContent = 'Synced';
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'init') msg.layers.forEach(l => receiveLayer(l));
      if (msg.type === 'new-layer') receiveLayer(msg.layer);
      if (msg.type === 'clear-all') {
        vizLayers.length = 0;
        activeLayerIdx = -1;
        renderLayerStack();
      }
    } catch (e) {}
  };

  ws.onclose = () => {
    connStatus.classList.remove('connected');
    connText.textContent = 'Local mode';
    reconnectTimer = setTimeout(connectWS, 5000);
  };

  ws.onerror = () => {
    connStatus.classList.remove('connected');
    connText.textContent = 'Local mode';
  };
}

// Override addVizLayer to broadcast
const _origAddVizLayer = addVizLayer;
addVizLayer = function(vizFn, name, opts = {}) {
  _origAddVizLayer(vizFn, name, opts);

  if (!opts.remote) {
    const layerData = {
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      vizName: name,
      vizCode: opts.vizCode || null,
      addedBy: userId,
    };
    broadcastLayer(layerData);
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'add-layer', ...layerData }));
    }
  }
};

connectWS();
</script>
